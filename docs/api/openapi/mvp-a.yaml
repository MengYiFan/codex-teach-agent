    RetryQuickStartRequest:
      type: object
      additionalProperties: false
      required: [expected_context_version, failed_task_ids]
      properties:
        expected_context_version: { type: integer, minimum: 1 }
        failed_task_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: string, format: uuid }
    GenerationAccepted:
      type: object
      required: [session_id, project_id, run_id, task_id, status, requested_at]
      properties:
        session_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        status: { type: string, const: queued }
        requested_at: { type: string, format: date-time }
    ProjectFile:
      type: object
      required: [id, file_name, media_type, file_size_bytes, status, created_at]
      properties:
        id: { type: string, format: uuid }
        file_name: { type: string }
        media_type:
          type: string
          enum:
            - application/pdf
            - application/vnd.openxmlformats-officedocument.presentationml.presentation
        file_size_bytes: { type: integer, minimum: 1, maximum: 52428800 }
        status: { type: string, enum: [uploaded, scanning, ready, rejected, parsing, parse_failed, parsed] }
        page_count: { type: [integer, 'null'], minimum: 1, maximum: 200 }
        created_at: { type: string, format: date-time }
    ProjectTextSource:
      type: object
      additionalProperties: false
      required: [id, project_id, source_role, character_count, created_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        source_role: { type: string, enum: [primary, supplement] }
        character_count: { type: integer, minimum: 10, maximum: 2000 }
        created_at: { type: string, format: date-time }
    ParsedContent:
      type: object
      additionalProperties: false
      required: [schema_version, file_id, file_type, pages]
      properties:
        schema_version: { type: string }
        file_id: { type: string, format: uuid }
        file_type: { type: string, enum: [pptx, pdf] }
        pages:
          type: array
          maxItems: 200
          items:
            type: object
            additionalProperties: false
            required: [page_index, blocks]
            properties:
              page_index: { type: integer, minimum: 1 }
              title: { type: [string, 'null'] }
              blocks:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required: [block_index, type]
                  properties:
                    block_index: { type: integer, minimum: 0 }
                    type: { type: string, enum: [text, image, table] }
                    text: { type: [string, 'null'] }
                    asset_id: { type: [string, 'null'], format: uuid }
                    confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
              notes: { type: [string, 'null'] }
    Project:
      type: object
      required: [id, title, title_source, status, version, context_version, detected_context, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        title_source: { type: string, enum: [placeholder, detected, user] }
        subject: { type: [string, 'null'] }
        grade: { type: [string, 'null'] }
        duration_minutes: { type: [integer, 'null'] }
        student_level: { $ref: '#/components/schemas/NullableStudentLevel' }
        status: { type: string, enum: [draft, generating, ready, partial, failed, deleted] }
        version: { type: integer, minimum: 1 }
        context_version: { type: integer, minimum: 1 }
        detected_context:
          $ref: '#/components/schemas/DetectedContext'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      required: [expected_version]
      minProperties: 2
      properties:
        expected_version: { type: integer, minimum: 1 }
        title: { type: string, minLength: 1, maxLength: 255 }
    ProjectContextUpdateResult:
      type: object
      additionalProperties: false
      required: [project, regeneration]
      properties:
        project: { $ref: '#/components/schemas/Project' }
        regeneration:
          oneOf:
            - $ref: '#/components/schemas/RegenerationAccepted'
            - type: 'null'
    RegenerationAccepted:
      type: object
      additionalProperties: false
      required: [run_id, task_id, status, requested_at]
      properties:
        run_id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        status: { type: string, const: queued }
        requested_at: { type: string, format: date-time }
    ProjectPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Project' }
        next_cursor: { type: [string, 'null'] }
    GenerationRun:
      type: object
      additionalProperties: false
      required:
        - id
        - session_id
        - project_id
        - run_kind
        - context_version
        - context_snapshot
        - requested_outputs
        - status
        - requested_at
      properties:
        id: { type: string, format: uuid }
        session_id: { type: [string, 'null'], format: uuid }
        project_id: { type: string, format: uuid }
        run_kind: { type: string, enum: [initial, retry_failed_outputs, regenerate_context] }
        retry_of_run_id: { type: [string, 'null'], format: uuid }
        context_version: { type: integer, minimum: 1 }
        context_snapshot: { $ref: '#/components/schemas/DetectedContext' }
        requested_outputs:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          items: { $ref: '#/components/schemas/OutputType' }
        status: { type: string, enum: [queued, running, succeeded, partial_success, failed, cancelled] }
        root_task_id: { type: [string, 'null'], format: uuid }
        requested_at: { type: string, format: date-time }
        first_meaningful_output_ready_at: { type: [string, 'null'], format: date-time }
        settled_at: { type: [string, 'null'], format: date-time }
    GenerationRunPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/GenerationRun' }
        next_cursor: { type: [string, 'null'] }
    GenerationTask:
      type: object
      required: [id, project_id, task_type, status, attempt, progress_percent, created_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        generation_run_id: { type: [string, 'null'], format: uuid }
        parent_task_id: { type: [string, 'null'], format: uuid }
        retry_of_task_id: { type: [string, 'null'], format: uuid }
        task_type:
          type: string
          enum: [generation_run, parse_file, build_course_ir, generate_output, review_quality, regenerate_block, render_export]
        target_type: { type: [string, 'null'], enum: [content_block, output, export, file, project, null] }
        target_id: { type: [string, 'null'], format: uuid }
        output_type:
          oneOf:
            - $ref: '#/components/schemas/OutputType'
            - type: 'null'
        status: { $ref: '#/components/schemas/TaskStatus' }
        attempt:
          type: integer
          minimum: 0
          description: 已创建的执行 attempt 数；queued 且尚未领取时为 0
        max_attempts: { type: integer, minimum: 1, maximum: 5 }
        progress_percent: { type: integer, minimum: 0, maximum: 100 }
        current_step: { type: [string, 'null'] }
        error: { oneOf: [{ $ref: '#/components/schemas/ErrorDetail' }, { type: 'null' }] }
        created_at: { type: string, format: date-time }
        started_at: { type: [string, 'null'], format: date-time }
        finished_at: { type: [string, 'null'], format: date-time }
    GenerationTaskAttempt:
      type: object
      additionalProperties: false
      required: [id, task_id, attempt_number, status, started_at]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        attempt_number: { type: integer, minimum: 1 }
        status: { type: string, enum: [running, succeeded, failed, cancelled] }
        error: { oneOf: [{ $ref: '#/components/schemas/ErrorDetail' }, { type: 'null' }] }
        started_at: { type: string, format: date-time }
        finished_at: { type: [string, 'null'], format: date-time }
    GenerationTaskPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/GenerationTask' }
        next_cursor: { type: [string, 'null'] }
    GeneratedOutput:
      type: object
      required: [id, project_id, output_type, title, current_version, status, review_status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        output_type: { $ref: '#/components/schemas/OutputType' }
        title: { type: string }
        current_version: { type: integer, minimum: 1 }
        status: { type: string, enum: [generating, ready, failed] }
        review_status: { $ref: '#/components/schemas/ReviewStatus' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    OutputVersion:
      type: object
      required: [id, output_id, version, course_ir_version_id, schema_version, block_manifest, review_status, created_by_type, generation_task_id, prompt_key, prompt_version, provider_type, model_name, created_at]
      properties:
        id: { type: string, format: uuid }
        output_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        course_ir_version_id: { type: string, format: uuid }
        schema_version: { type: string }
        block_manifest:
          type: array
          items: { $ref: '#/components/schemas/BlockVersionReference' }
        review_status: { $ref: '#/components/schemas/ReviewStatus' }
        created_by_type: { type: string, enum: [user, model, system, restore] }
        generation_task_id: { type: [string, 'null'], format: uuid }
        prompt_key: { type: [string, 'null'] }
        prompt_version: { type: [string, 'null'] }
        provider_type: { type: [string, 'null'], enum: [openai_compatible, azure_openai, anthropic, gemini, local, null] }
        model_name: { type: [string, 'null'] }
        change_summary: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
    OutputVersionPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OutputVersion' }
        next_cursor: { type: [string, 'null'] }
    BlockVersionReference:
      type: object
      additionalProperties: false
      required: [block_id, version_id, version, position]
      properties:
        block_id: { type: string, format: uuid }
        version_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        position: { type: integer, minimum: 0 }
    ContentBlock:
      type: object
      required: [id, output_id, stable_key, block_type, position, current_version, review_status, content, source_refs, knowledge_point_ids, reuse_policy]
      properties:
        id: { type: string, format: uuid }
        output_id: { type: string, format: uuid }
        stable_key: { type: string }
        block_type:
          type: string
          enum: [note, quiz, answer, teacher_tip, lesson_plan_section]
        position: { type: integer, minimum: 0 }
        current_version: { type: integer, minimum: 1 }
        review_status: { $ref: '#/components/schemas/ReviewStatus' }
        title: { type: [string, 'null'] }
        content: { $ref: '#/components/schemas/BlockBody' }
        source_refs:
          type: array
          items: { $ref: '#/components/schemas/SourceRef' }
        knowledge_point_ids:
          type: array
          uniqueItems: true
          items: { type: string, format: uuid }
        reuse_policy: { type: string, enum: [private, project] }
    ContentBlockVersion:
      type: object
      additionalProperties: false
      required:
        - version_id
        - block_id
        - output_id
        - version
        - stable_key
        - block_type
        - position
        - review_status
        - is_deleted
        - source_refs
        - knowledge_point_ids
        - reuse_policy
        - created_at
        - created_by_type
        - generation_task_id
        - prompt_key
        - prompt_version
        - provider_type
        - model_name
      properties:
        version_id: { type: string, format: uuid }
        block_id: { type: string, format: uuid }
        output_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        stable_key: { type: string }
        block_type:
          type: string
          enum: [note, quiz, answer, teacher_tip, lesson_plan_section]
        position: { type: integer, minimum: 0 }
        review_status: { $ref: '#/components/schemas/ReviewStatus' }
        is_deleted: { type: boolean }
        title: { type: [string, 'null'] }
        content:
          oneOf:
            - $ref: '#/components/schemas/BlockBody'
            - type: 'null'
        source_refs:
          type: array
          items: { $ref: '#/components/schemas/SourceRef' }
        knowledge_point_ids:
          type: array
          uniqueItems: true
          items: { type: string, format: uuid }
        reuse_policy: { type: string, enum: [private, project] }
        created_at: { type: string, format: date-time }
        created_by_type: { type: string, enum: [user, model, system, restore] }
        generation_task_id: { type: [string, 'null'], format: uuid }
        prompt_key: { type: [string, 'null'] }
        prompt_version: { type: [string, 'null'] }
        provider_type: { type: [string, 'null'], enum: [openai_compatible, azure_openai, anthropic, gemini, local, null] }
        model_name: { type: [string, 'null'] }
        change_summary: { type: [string, 'null'] }
    ContentBlockPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ContentBlock' }
        next_cursor: { type: [string, 'null'] }
    ContentBlockVersionPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ContentBlockVersion' }
        next_cursor: { type: [string, 'null'] }
    BlockBody:
      oneOf:
        - $ref: '#/components/schemas/PlainTextBody'
        - $ref: '#/components/schemas/MarkdownBody'
        - $ref: '#/components/schemas/RichTextBody'
        - $ref: '#/components/schemas/QuestionBody'
      discriminator:
        propertyName: format
    PlainTextBody:
      type: object
      additionalProperties: false
      required: [format, content]
      properties:
        format: { const: plain_text }
        content: { type: string, maxLength: 100000 }
    MarkdownBody:
      type: object
      additionalProperties: false
      required: [format, content]
      properties:
        format: { const: markdown }
        content: { type: string, maxLength: 100000 }
    RichTextBody:
      type: object
      additionalProperties: false
      required: [format, content]
      properties:
        format: { const: rich_text }
        content:
          type: object
          additionalProperties: false
          required: [type, content]
          properties:
            type: { const: doc }
            content:
              type: array
              maxItems: 2000
              items: { type: object, additionalProperties: true }
    QuestionBody:
      type: object
      additionalProperties: false
      required: [format, content]
      properties:
        format: { const: question }
        content: { $ref: '#/components/schemas/QuestionContent' }
    QuestionContent:
      type: object
      additionalProperties: false
      required: [question, type, answer, explanation, difficulty]
      allOf:
        - if:
            properties:
              type: { enum: [single_choice, multiple_choice] }
          then:
            required: [options]
            properties:
              options: { minItems: 2 }
      properties:
        question: { type: string, minLength: 1, maxLength: 5000 }
        type: { type: string, enum: [single_choice, multiple_choice, true_false, fill_blank, short_answer, case_analysis] }
        options:
          type: array
          maxItems: 12
          items: { type: string, maxLength: 1000 }
        answer:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 5000
            - type: array
              minItems: 1
              uniqueItems: true
              items: { type: string, minLength: 1, maxLength: 1000 }
            - type: boolean
        explanation: { type: string, minLength: 1, maxLength: 10000 }
        difficulty: { type: string, enum: [basic, normal, advanced] }
        knowledge_point_id: { type: [string, 'null'], format: uuid }
    SourceRef:
      oneOf:
        - $ref: '#/components/schemas/FileSourceRef'
        - $ref: '#/components/schemas/TextSourceRef'
      discriminator:
        propertyName: source_kind
    FileSourceRef:
      type: object
      additionalProperties: false
      required: [source_kind, file_id, page_index]
      properties:
        source_kind: { const: file }
        file_id: { type: string, format: uuid }
        page_index: { type: integer, minimum: 1 }
        quote: { type: [string, 'null'], maxLength: 500 }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
    TextSourceRef:
      type: object
      additionalProperties: false
      required: [source_kind, text_source_id]
      dependentRequired:
        char_start: [char_end]
        char_end: [char_start]
      properties:
        source_kind: { const: source_text }
        text_source_id: { type: string, format: uuid }
        char_start: { type: [integer, 'null'], minimum: 0 }
        char_end:
          type: [integer, 'null']
          minimum: 1
          description: 非空时必须大于 char_start，区间左闭右开
        quote: { type: [string, 'null'], maxLength: 500 }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
    UpdateContentBlockRequest:
      type: object
      additionalProperties: false
      required: [expected_version, body, change_summary]
      properties:
        expected_version: { type: integer, minimum: 1 }
        title: { type: [string, 'null'], maxLength: 255 }
        body: { $ref: '#/components/schemas/BlockBody' }
        change_summary: { type: string, minLength: 1, maxLength: 500 }
    RegenerateContentBlockRequest:
      type: object
      additionalProperties: false
      required: [expected_version, action]
      properties:
        expected_version: { type: integer, minimum: 1 }
        action:
          type: string
          enum: [simplify, expand, change_example, change_questions, custom]
        instruction: { type: [string, 'null'], maxLength: 1000 }
    RestoreVersionRequest:
      type: object
      additionalProperties: false
      required: [expected_current_version]
      properties:
        expected_current_version: { type: integer, minimum: 1 }
    ReviewFinding:
      type: object
      required: [id, project_id, version, finding_type, severity, status, message, created_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        output_id: { type: [string, 'null'], format: uuid }
        block_id: { type: [string, 'null'], format: uuid }
        block_version: { type: [integer, 'null'], minimum: 1 }
        context_version: { type: [integer, 'null'], minimum: 1 }
        finding_type:
          type: string
          enum: [missing_source, low_confidence_context, invalid_question_structure, answer_format_mismatch, single_choice_not_unique]
        severity: { type: string, enum: [info, warning, blocking] }
        status: { $ref: '#/components/schemas/ReviewFindingStatus' }
        message: { type: string }
        source_refs:
          type: array
          items: { $ref: '#/components/schemas/SourceRef' }
        created_at: { type: string, format: date-time }
        resolved_at: { type: [string, 'null'], format: date-time }
    ReviewFindingPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ReviewFinding' }
        next_cursor: { type: [string, 'null'] }
    ResolveReviewFindingRequest:
      type: object
      additionalProperties: false
      required: [action, expected_finding_version]
      allOf:
        - if:
            properties:
              action: { const: dismissed }
          then:
            required: [note]
            properties:
              note: { type: string, minLength: 1, maxLength: 500 }
      oneOf:
        - required: [expected_block_version]
          properties:
            expected_block_version: { type: integer, minimum: 1 }
            expected_context_version: false
        - required: [expected_context_version]
          properties:
            expected_context_version: { type: integer, minimum: 1 }
            expected_block_version: false
      properties:
        action: { type: string, enum: [confirmed, fixed, dismissed] }
        expected_finding_version: { type: integer, minimum: 1 }
        expected_block_version:
          type: integer
          minimum: 1
          description: 块级 finding 必填；项目或上下文级 finding 必须省略
        expected_context_version:
          type: integer
          minimum: 1
          description: 项目或上下文级 finding 必填；块级 finding 必须省略
        note: { type: [string, 'null'], maxLength: 500 }
    CreateExportRequest:
      type: object
      additionalProperties: false
      required: [format, output_versions, template_key]
      properties:
        format: { type: string, enum: [pdf, docx, markdown] }
        output_versions:
          type: array
          minItems: 1
          uniqueItems: true
          items: { $ref: '#/components/schemas/OutputVersionReference' }
        template_key: { type: string, minLength: 1, maxLength: 100 }
    Export:
      type: object
      required: [id, project_id, output_versions, format, status, template_key, template_version, created_at, expires_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        task_id: { type: [string, 'null'], format: uuid }
        output_versions:
          type: array
          minItems: 1
          uniqueItems: true
          items: { $ref: '#/components/schemas/OutputVersionReference' }
        format: { type: string, enum: [pdf, docx, markdown] }
        status: { type: string, enum: [queued, rendering, succeeded, failed, expired] }
        template_key: { type: string }
        template_version: { type: integer, minimum: 1 }
        file_name: { type: [string, 'null'] }
        file_size_bytes: { type: [integer, 'null'], minimum: 0 }
        sha256: { type: [string, 'null'], pattern: '^[a-f0-9]{64}$' }
        error: { oneOf: [{ $ref: '#/components/schemas/ErrorDetail' }, { type: 'null' }] }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
        expires_at: { type: [string, 'null'], format: date-time }
    DownloadTicket:
      type: object
      required: [download_url, expires_at]
      properties:
        download_url: { type: string, format: uri }
        expires_at: { type: string, format: date-time }
    DeletionOperation:
      type: object
      additionalProperties: false
      required: [id, project_id, status, requested_at, expires_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        status:
          type: string
          enum: [queued, running, online_deleted, completed, failed, dead_lettered]
        online_objects_deleted_at: { type: [string, 'null'], format: date-time }
        model_details_deleted_at: { type: [string, 'null'], format: date-time }
        backup_tombstone_recorded_at: { type: [string, 'null'], format: date-time }
        error: { oneOf: [{ $ref: '#/components/schemas/ErrorDetail' }, { type: 'null' }] }
        requested_at: { type: string, format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
        expires_at: { type: string, format: date-time }
    QualityFeedbackRequest:
      type: object
      additionalProperties: false
      required: [output_versions, usability_rating]
      properties:
        output_versions:
          type: array
          minItems: 1
          uniqueItems: true
          items: { $ref: '#/components/schemas/OutputVersionReference' }
        usability_rating:
          type: string
          enum: [direct_use, minor_edit, major_edit, unusable]
    QualityFeedback:
      type: object
      additionalProperties: false
      required: [id, project_id, version, output_versions, usability_rating, before_first_export, created_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        output_versions:
          type: array
          items: { $ref: '#/components/schemas/OutputVersionReference' }
        usability_rating:
          type: string
          enum: [direct_use, minor_edit, major_edit, unusable]
        before_first_export: { type: boolean }
        created_at: { type: string, format: date-time }
    OutputVersionReference:
      type: object
      additionalProperties: false
      required: [output_id, version]
      properties:
        output_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
    ClientEventBatch:
      type: object
      additionalProperties: false
      required: [visit_session_id, anonymous_id, events]
      properties:
        visit_session_id: { type: string, format: uuid }
        anonymous_id: { type: string, minLength: 16, maxLength: 100, writeOnly: true }
        events:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: '#/components/schemas/ClientEvent' }
    ClientEvent:
      type: object
      additionalProperties: false
      required: [event_id, event_name, occurred_at, app_version, properties]
      properties:
        event_id: { type: string, format: uuid }
        event_name:
          type: string
          enum:
            - quick_start_viewed
            - sample_project_opened
            - auth_prompt_shown
            - auth_completed
            - quick_start_intent_selected
            - file_upload_started
            - first_preview_shown
            - paywall_shown
        occurred_at: { type: string, format: date-time }
        app_version: { type: string, minLength: 1, maxLength: 100 }
        source: { type: string, maxLength: 50 }
        experiment_ids:
          type: array
          maxItems: 20
          uniqueItems: true
          items: { type: string, maxLength: 50 }
        quick_start_session_id: { type: [string, 'null'], format: uuid }
        generation_run_id: { type: [string, 'null'], format: uuid }
        properties:
          type: object
          additionalProperties: false
          maxProperties: 10
          properties:
            is_logged_in: { type: boolean }
            trigger: { type: string, maxLength: 50 }
            method: { type: string, maxLength: 50 }
            return_source: { type: string, maxLength: 50 }
            intent: { $ref: '#/components/schemas/Intent' }
            file_type: { type: string, enum: [pptx, pdf] }
            file_size_bucket: { type: string, maxLength: 30 }
            output_type: { $ref: '#/components/schemas/OutputType' }
            source_type: { $ref: '#/components/schemas/SourceType' }
            time_from_ready_to_shown_ms: { type: integer, minimum: 0 }
            plan_suggested: { type: string, maxLength: 30 }
            sample_subject: { type: string, maxLength: 50 }
            sample_grade: { type: string, maxLength: 50 }
    EventBatchAccepted:
      type: object
      additionalProperties: false
      required: [accepted_count, duplicate_count]
      properties:
        accepted_count: { type: integer, minimum: 0, maximum: 50 }
        duplicate_count: { type: integer, minimum: 0, maximum: 50 }
    ModelProvider:
      type: object
      required: [id, provider_type, display_name, auth_type, credential_status, enabled, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        provider_type:
          type: string
          enum: [openai_compatible, azure_openai, anthropic, gemini, local]
        display_name: { type: string }
        base_url: { type: [string, 'null'], format: uri, pattern: '^https?://', maxLength: 2048 }
        auth_type: { type: string, enum: [api_key, workload_identity, none] }
        credential_status: { type: string, enum: [configured, workload_identity, missing] }
        credential_last_four: { type: [string, 'null'], maxLength: 4 }
        enabled: { type: boolean }
        version: { type: integer, minimum: 1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ModelProviderPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ModelProvider' }
        next_cursor: { type: [string, 'null'] }
    CreateModelProviderRequest:
      type: object
      additionalProperties: false
      required: [provider_type, display_name, auth_type]
      allOf:
        - if:
            properties:
              auth_type: { const: api_key }
          then:
            required: [api_key]
            properties:
              api_key: { type: string, minLength: 8, writeOnly: true }
        - if:
            properties:
              auth_type: { enum: [workload_identity, none] }
          then:
            properties:
              api_key: { type: 'null' }
        - if:
            properties:
              provider_type: { enum: [openai_compatible, azure_openai, local] }
          then:
            required: [base_url]
            properties:
              base_url: { type: string, format: uri, pattern: '^https?://', maxLength: 2048 }
      properties:
        provider_type:
          type: string
          enum: [openai_compatible, azure_openai, anthropic, gemini, local]
        display_name: { type: string, minLength: 1, maxLength: 100 }
        base_url: { type: [string, 'null'], format: uri, pattern: '^https?://', maxLength: 2048 }
        auth_type: { type: string, enum: [api_key, workload_identity, none] }
        api_key: { type: [string, 'null'], minLength: 8, writeOnly: true }
    ModelConfig:
      type: object
      required: [id, provider_id, display_name, model_name, capability, routing_priority, enabled, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        provider_id: { type: string, format: uuid }
        display_name: { type: string }
        model_name: { type: string }
        capability: { type: object, additionalProperties: true }
        routing_priority: { type: integer, minimum: 1 }
        max_output_tokens: { type: [integer, 'null'], minimum: 1 }
        temperature: { type: [number, 'null'], minimum: 0, maximum: 2 }
        enabled: { type: boolean }
        version: { type: integer, minimum: 1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ModelConfigPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ModelConfig' }
        next_cursor: { type: [string, 'null'] }
    CreateModelConfigRequest:
      type: object
      additionalProperties: false
      required: [display_name, model_name, capability]
      properties:
        display_name: { type: string, minLength: 1, maxLength: 100 }
        model_name: { type: string, minLength: 1, maxLength: 150 }
        capability: { type: object, minProperties: 1, additionalProperties: true }
        routing_priority: { type: integer, minimum: 1, maximum: 1000, default: 100 }
        max_output_tokens: { type: [integer, 'null'], minimum: 1 }
        temperature: { type: [number, 'null'], minimum: 0, maximum: 2 }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { $ref: '#/components/schemas/ErrorDetail' }
    ErrorDetail:
      type: object
      required: [code, message, request_id, retryable]
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - AUTH_REQUIRED
            - FORBIDDEN
            - RESOURCE_NOT_FOUND
            - INVALID_STATE_TRANSITION
            - VERSION_CONFLICT
            - IDEMPOTENCY_KEY_REUSED
            - RESOURCE_BUSY
            - FILE_TOO_LARGE
            - UNSUPPORTED_FILE_TYPE
            - SOURCE_REQUIRED
            - FILE_UNREADABLE
            - QUOTA_EXCEEDED
            - MODEL_UNAVAILABLE
            - TASK_QUEUE_UNAVAILABLE
        message: { type: string }
        request_id: { type: string }
        retryable: { type: boolean }
        details:
          description: 错误码为状态、版本或资源忙时必须匹配对应结构
          anyOf:
            - $ref: '#/components/schemas/InvalidStateDetails'
            - $ref: '#/components/schemas/VersionConflictDetails'
            - $ref: '#/components/schemas/ResourceBusyDetails'
            - type: object
              additionalProperties: true
    InvalidStateDetails:
      type: object
      required: [current_state, allowed_actions]
      properties:
        current_state: { type: string }
        allowed_actions:
          type: array
          items: { type: string }
    VersionConflictDetails:
      type: object
      required: [expected_version, current_version]
      properties:
        expected_version: { type: integer, minimum: 1 }
        current_version: { type: integer, minimum: 1 }
    ResourceBusyDetails:
      type: object
      required: [active_task_id]
      properties:
        active_task_id: { type: string, format: uuid }

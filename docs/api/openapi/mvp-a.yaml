            application/json:
              schema: { $ref: '#/components/schemas/ModelProvider' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /admin/model-providers/{provider_id}:
    parameters:
      - name: provider_id

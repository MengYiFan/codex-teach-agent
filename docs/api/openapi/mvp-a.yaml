              minProperties: 2
              properties:
                expected_version: { type: integer, minimum: 1 }
                display_name: { type: string, minLength: 1, maxLength: 100 }
                base_url: { type: [string, 'null'], format: uri, pattern: '^https?://', maxLength: 2048 }
                api_key: { type: string, minLength: 8, writeOnly: true }
                enabled: { type: boolean }
      responses:
        '200':
          description: 已更新
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelProvider' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }

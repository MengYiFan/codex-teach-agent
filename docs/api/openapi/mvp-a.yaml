openapi: 3.1.0
info:
  title: Teaching Content Generation MVP-A API
  version: 0.2.0
  description: |
    MVP-A 的机器可读 HTTP 契约。所有时间均为 UTC RFC 3339，所有资源 ID 均为 UUID。
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: QuickStart
    description: 快速生成会话、来源和聚合状态
  - name: Projects
    description: 教师备课项目和输入文件
  - name: Tasks
    description: 异步任务状态、重试与取消
  - name: Outputs
    description: 生成产物和整份输出版本
  - name: ContentBlocks
    description: 可编辑、可重写的内容块及版本
  - name: Review
    description: 风险项和教师确认
  - name: Exports
    description: 固定版本清单的文档导出
  - name: Analytics
    description: 质量反馈和受控客户端埋点
  - name: ModelAdmin
    description: 仅模型管理员可用的供应商与模型配置

paths:
  /quick-start/sessions:
    post:
      tags: [QuickStart]
      operationId: createQuickStartSession
      summary: 创建快速生成会话，不创建项目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuickStartSessionRequest'
      responses:
        '201':
          description: 会话已创建
          headers: &standardResponseHeaders
            X-Request-Id: { $ref: '#/components/headers/XRequestId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickStartSession'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/AuthRequired' }

  /quick-start/sessions/{session_id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [QuickStart]
      operationId: getQuickStartSession
      summary: 查询聚合进度
      responses:
        '200':
          description: 当前状态
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickStartSession'
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/AuthRequired' }
    patch:
      tags: [QuickStart]
      operationId: updateQuickStartSession
      summary: 在生成前修改用途、输出或文本说明
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateQuickStartSessionRequest' }
      responses:
        '200':
          description: 会话已更新且 context_version 已递增
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuickStartSession' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '401': { $ref: '#/components/responses/AuthRequired' }
  /quick-start/sessions/{session_id}/files:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [QuickStart]
      operationId: listQuickStartFiles
      summary: 查询尚未生成的会话文件
      responses:
        '200':
          description: 临时文件列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                type: array
                maxItems: 1
                items: { $ref: '#/components/schemas/ProjectFile' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/AuthRequired' }
    post:
      tags: [QuickStart]
      operationId: uploadQuickStartFile
      summary: 上传一个 PPTX 或 PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: 已接收并开始安全与格式检查
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFile'
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/FileTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedFileType' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
  /quick-start/sessions/{session_id}/files/{file_id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/FileId'
    delete:
      tags: [QuickStart]
      operationId: deleteQuickStartFile
      summary: 删除尚未生成的临时文件
      responses:
        '204':
          description: 已删除
          headers: *standardResponseHeaders
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /quick-start/sessions/{session_id}/confirm-context:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [QuickStart]
      operationId: confirmQuickStartContext
      summary: 确认或修改课程上下文
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmContextRequest'
      responses:
        '200':
          description: 已保存
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickStartSession'
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
  /quick-start/sessions/{session_id}/generate:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [QuickStart]
      operationId: generateFromQuickStartSession
      summary: 原子创建项目并开始生成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context_version]
              properties:
                context_version:
                  type: integer
                  minimum: 1
      responses:
        '202':
          description: 已入队
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationAccepted'
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/SourceRequired' }
        '429': { $ref: '#/components/responses/QuotaExceeded' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
  /quick-start/sessions/{session_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [QuickStart]
      operationId: cancelQuickStartSession
      summary: 取消尚未完成的步骤
      responses:
        '202':
          description: 已接受取消请求
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickStartSession'
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
  /quick-start/sessions/{session_id}/retry:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [QuickStart]
      operationId: retryQuickStartFailures
      summary: 为最近一轮的可恢复失败创建新 generation run
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RetryQuickStartRequest' }
      responses:
        '202':
          description: 重试 run 已创建
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenerationAccepted' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: 分页查询当前教师的项目
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 项目列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPage'
        '401': { $ref: '#/components/responses/AuthRequired' }

  /projects/{project_id}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      operationId: getProject
      summary: 查询项目详情
      responses:
        '200':
          description: 项目详情
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/AuthRequired' }
    patch:
      tags: [Projects]
      operationId: updateProject
      summary: 以乐观锁更新项目标题
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 已更新
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '401': { $ref: '#/components/responses/AuthRequired' }
    delete:
      tags: [Projects]
      operationId: deleteProject
      summary: 软删除项目并安排数据清理
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 已软删除并排队清理
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeletionOperation' }
        '404': { $ref: '#/components/responses/NotFound' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /projects/{project_id}/confirm-context:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Projects]
      operationId: confirmProjectContext
      summary: 版本化确认项目上下文并可选创建重生成 run
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmContextRequest' }
      responses:
        '200':
          description: 上下文已更新
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectContextUpdateResult' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /deletion-operations/{operation_id}:
    parameters:
      - name: operation_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Projects]
      operationId: getDeletionOperation
      summary: 查询项目数据清理状态
      responses:
        '200':
          description: 删除操作状态
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeletionOperation' }
        '404': { $ref: '#/components/responses/NotFound' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /projects/{project_id}/tasks:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Tasks]
      operationId: listProjectTasks
      summary: 查询项目任务
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 任务列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenerationTaskPage' }
        '401': { $ref: '#/components/responses/AuthRequired' }

        '404': { $ref: '#/components/responses/NotFound' }
  /projects/{project_id}/generation-runs:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Tasks]
      operationId: listProjectGenerationRuns
      summary: 查询项目初次生成和显式重生成历史
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: generation run 列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenerationRunPage' }
        '404': { $ref: '#/components/responses/NotFound' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /generation-runs/{run_id}:
    parameters:
      - name: run_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Tasks]
      operationId: getGenerationRun
      summary: 查询 generation run 聚合结果
      responses:
        '200':
          description: generation run
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenerationRun' }
        '404': { $ref: '#/components/responses/NotFound' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /projects/{project_id}/files:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      operationId: listProjectFiles
      summary: 查询项目输入文件
      responses:
        '200':
          description: 项目文件列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                type: array
                maxItems: 1
                items: { $ref: '#/components/schemas/ProjectFile' }
        '401': { $ref: '#/components/responses/AuthRequired' }

        '404': { $ref: '#/components/responses/NotFound' }
  /projects/{project_id}/text-sources:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      operationId: listProjectTextSources
      summary: 查询项目文本来源元数据
      responses:
        '200':
          description: 文本来源列表；不返回完整正文
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                type: array
                maxItems: 1
                items: { $ref: '#/components/schemas/ProjectTextSource' }
        '404': { $ref: '#/components/responses/NotFound' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /files/{file_id}/parsed-result:
    parameters:
      - $ref: '#/components/parameters/FileId'
    get:
      tags: [Projects]
      operationId: getParsedFileResult
      summary: 查询文件结构化解析结果
      responses:
        '200':
          description: 结构化解析结果
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParsedContent' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /assets/{asset_id}/download:
    parameters:
      - name: asset_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Projects]
      operationId: downloadProjectAsset
      summary: 获取解析资源的短期下载票据
      responses:
        '200':
          description: 下载票据
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DownloadTicket' }
        '404': { $ref: '#/components/responses/NotFound' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /tasks/{task_id}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Tasks]
      operationId: getTask
      summary: 查询单个异步任务
      responses:
        '200':
          description: 任务状态
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenerationTask' }
        '404': { $ref: '#/components/responses/NotFound' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /tasks/{task_id}/retry:
    parameters:
      - $ref: '#/components/parameters/TaskId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Tasks]
      operationId: retryTask
      summary: 为独立失败任务创建引用原任务的后继任务
      responses:
        '202':
          description: 已创建后继任务
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenerationTask' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /tasks/{task_id}/attempts:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Tasks]
      operationId: listTaskAttempts
      summary: 查询逻辑任务的不可变执行 attempt
      responses:
        '200':
          description: attempt 列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                type: array
                maxItems: 5
                items: { $ref: '#/components/schemas/GenerationTaskAttempt' }
        '404': { $ref: '#/components/responses/NotFound' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /tasks/{task_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/TaskId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Tasks]
      operationId: cancelTask
      summary: 取消尚未完成的任务步骤
      responses:
        '202':
          description: 已接受
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenerationTask' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
  /projects/{project_id}/outputs:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Outputs]
      operationId: listProjectOutputs
      summary: 查询项目生成产物
      responses:
        '200':
          description: 输出列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                type: array
                maxItems: 4
                items: { $ref: '#/components/schemas/GeneratedOutput' }
        '401': { $ref: '#/components/responses/AuthRequired' }

        '404': { $ref: '#/components/responses/NotFound' }
  /outputs/{output_id}:
    parameters:
      - $ref: '#/components/parameters/OutputId'
    get:
      tags: [Outputs]
      operationId: getOutput
      summary: 查询单个生成产物
      responses:
        '200':
          description: 输出详情
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GeneratedOutput' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /outputs/{output_id}/versions:
    parameters:
      - $ref: '#/components/parameters/OutputId'
    get:
      tags: [Outputs]
      operationId: listOutputVersions
      summary: 查询整份输出版本
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 版本列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutputVersionPage' }
        '401': { $ref: '#/components/responses/AuthRequired' }

        '404': { $ref: '#/components/responses/NotFound' }
  /outputs/{output_id}/versions/{version}/restore:
    parameters:
      - $ref: '#/components/parameters/OutputId'
      - name: version
        in: path
        required: true
        schema: { type: integer, minimum: 1 }
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Outputs]
      operationId: restoreOutputVersion
      summary: 从历史快照创建新的当前版本
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RestoreVersionRequest' }
      responses:
        '201':
          description: 已从历史版本创建新版本
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutputVersion' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

        '401': { $ref: '#/components/responses/AuthRequired' }
  /outputs/{output_id}/blocks:
    parameters:
      - $ref: '#/components/parameters/OutputId'
    get:
      tags: [ContentBlocks]
      operationId: listOutputBlocks
      summary: 查询输出的当前内容块
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 内容块列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentBlockPage' }
        '401': { $ref: '#/components/responses/AuthRequired' }

        '404': { $ref: '#/components/responses/NotFound' }
  /content-blocks/{block_id}:
    parameters:
      - $ref: '#/components/parameters/BlockId'
    get:
      tags: [ContentBlocks]
      operationId: getContentBlock
      summary: 查询内容块当前版本
      responses:
        '200':
          description: 内容块
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentBlock' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/AuthRequired' }
    patch:
      tags: [ContentBlocks]
      operationId: updateContentBlock
      summary: 以乐观锁编辑内容块并创建版本
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateContentBlockRequest' }
      responses:
        '201':
          description: 已创建新版本
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentBlock' }
        '409': { $ref: '#/components/responses/Conflict' }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [ContentBlocks]
      operationId: deleteContentBlock
      summary: 以 tombstone 新版本删除当前内容块
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: expected_version
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: 已创建 tombstone 和新的整份输出版本
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutputVersion' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }


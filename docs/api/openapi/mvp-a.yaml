      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: expected_version
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '204':
          description: 已禁用并排队删除凭据
          headers: *standardResponseHeaders
        '403': { $ref: '#/components/responses/Forbidden' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/model-providers/{provider_id}/test:
    parameters:
      - name: provider_id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [ModelAdmin]
      operationId: testModelProvider
      summary: 使用最小请求测试供应商连通性
      responses:
        '200':
          description: 连通性结果
          headers: *standardResponseHeaders
          content:
            application/json:
              schema:
                type: object
                required: [ok, latency_ms]
                properties:
                  ok: { type: boolean }
                  latency_ms: { type: integer, minimum: 0 }
                  message: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
  /admin/model-providers/{provider_id}/models:
    parameters:
      - name: provider_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [ModelAdmin]
      operationId: listModelConfigs
      summary: 查询供应商下的模型配置
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 模型配置列表
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelConfigPage' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [ModelAdmin]
      operationId: createModelConfig
      summary: 创建模型及能力配置
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateModelConfigRequest' }
      responses:
        '201':
          description: 已创建
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelConfig' }
        '403': { $ref: '#/components/responses/Forbidden' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/model-configs/{config_id}:
    parameters:
      - name: config_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [ModelAdmin]
      operationId: updateModelConfig
      summary: 更新模型能力、路由和启用状态
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expected_version]
              minProperties: 2
              properties:
                expected_version: { type: integer, minimum: 1 }
                display_name: { type: string, minLength: 1, maxLength: 100 }
                capability: { type: object, additionalProperties: true }
                routing_priority: { type: integer, minimum: 1, maximum: 1000 }
                max_output_tokens: { type: [integer, 'null'], minimum: 1 }
                temperature: { type: [number, 'null'], minimum: 0, maximum: 2 }
                enabled: { type: boolean }
      responses:
        '200':
          description: 已更新
          headers: *standardResponseHeaders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelConfig' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [ModelAdmin]
      operationId: deleteModelConfig
      summary: 删除模型配置
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: expected_version
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '204':
          description: 已禁用并删除
          headers: *standardResponseHeaders
        '403': { $ref: '#/components/responses/Forbidden' }

        '401': { $ref: '#/components/responses/AuthRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    XRequestId:
      description: 面向调用方的请求关联 ID，不暴露内部拓扑
      required: true
      schema: { type: string, minLength: 8, maxLength: 100 }

  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProjectId:
      name: project_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    FileId:
      name: file_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TaskId:
      name: task_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    OutputId:
      name: output_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    BlockId:
      name: block_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ExportId:
      name: export_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  responses:
    ValidationError:
      description: 请求校验失败
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    AuthRequired:
      description: 需要登录
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: 无权限
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: 资源不存在或不可见
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: 状态、版本、幂等键或并发冲突
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    FileTooLarge:
      description: 文件超过 50 MiB
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnsupportedFileType:
      description: 文件类型不支持
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    SourceRequired:
      description: 缺少有效文件或文本来源
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    QuotaExceeded:
      description: 套餐或速率额度不足
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServiceUnavailable:
      description: 模型或任务队列暂不可用
      headers:
        X-Request-Id: { $ref: '#/components/headers/XRequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    Intent:
      type: string
      enum: [teach_tomorrow, student_review, create_quiz, write_lesson_plan]
    SourceType:
      type: string
      enum: [file, text, file_with_text]
    OutputType:
      type: string
      enum: [study_notes, quiz, teacher_tips, lesson_plan_draft]
    StudentLevel:
      type: string
      enum: [basic, normal, advanced]
    NullableStudentLevel:
      oneOf:
        - $ref: '#/components/schemas/StudentLevel'
        - type: 'null'
    SessionStatus:
      type: string
      enum:
        - awaiting_source
        - source_validating
        - source_ready
        - queued
        - parsing
        - detecting_context
        - generating
        - reviewing_quality
        - partial_success
        - succeeded
        - failed
        - cancelled
        - expired
    TaskStatus:
      type: string
      enum: [queued, running, retrying, succeeded, failed, dead_lettered, cancelled]
    ReviewStatus:
      type: string
      enum: [unreviewed, confirmed]
    ReviewFindingStatus:
      type: string
      enum: [open, confirmed, fixed, dismissed, superseded]
    CreateQuickStartSessionRequest:
      type: object
      additionalProperties: false
      required: [intent, source_type]
      allOf:
        - if:
            properties:
              source_type: { const: file }
          then:
            properties:
              source_text: { type: 'null' }
        - if:
            properties:
              source_type: { enum: [text, file_with_text] }
          then:
            required: [source_text]
            properties:
              source_text: { type: string, minLength: 10, maxLength: 2000 }
      properties:
        intent: { $ref: '#/components/schemas/Intent' }
        source_type: { $ref: '#/components/schemas/SourceType' }
        source_text:
          type: [string, 'null']
          minLength: 10
          maxLength: 2000
        preferred_outputs:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          items: { $ref: '#/components/schemas/OutputType' }
        optional_context: { $ref: '#/components/schemas/OptionalContext' }
        client_trace_id:
          type: [string, 'null']
          maxLength: 100
    UpdateQuickStartSessionRequest:
      type: object
      additionalProperties: false
      required: [expected_context_version]
      minProperties: 2
      properties:
        expected_context_version: { type: integer, minimum: 1 }
        intent: { $ref: '#/components/schemas/Intent' }
        preferred_outputs:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          items: { $ref: '#/components/schemas/OutputType' }
        source_text: { type: string, minLength: 10, maxLength: 2000 }
    OptionalContext:
      type: object
      additionalProperties: false
      properties:
        subject: { type: [string, 'null'], maxLength: 100 }
        grade: { type: [string, 'null'], maxLength: 100 }
        duration_minutes: { type: [integer, 'null'], minimum: 5, maximum: 480 }
        student_level: { $ref: '#/components/schemas/NullableStudentLevel' }
        teaching_scenario: { type: [string, 'null'], maxLength: 100 }
    ContextPatch:
      allOf:
        - $ref: '#/components/schemas/OptionalContext'
        - type: object
          minProperties: 1
    ContextField:
      type: object
      required: [value, source, confidence, needs_confirmation]
      properties:
        value: { type: [string, integer, 'null'] }
        source:
          type: string
          enum: [user, file_metadata, model_inference, product_default]
        confidence: { type: number, minimum: 0, maximum: 1 }
        needs_confirmation: { type: boolean }
    DetectedContext:
      type: object
      additionalProperties: { $ref: '#/components/schemas/ContextField' }
    QuickStartSession:
      type: object
      required:
        - session_id
        - project_id
        - active_run_id
        - latest_run_id
        - status
        - intent
        - source_type
        - preferred_outputs
        - context_version
        - progress_percent
        - available_outputs
        - warnings
        - recoverable_errors
        - expires_at
        - teacher_visible_message
      properties:
        session_id: { type: string, format: uuid }
        project_id: { type: [string, 'null'], format: uuid }
        active_run_id: { type: [string, 'null'], format: uuid }
        latest_run_id: { type: [string, 'null'], format: uuid }
        status: { $ref: '#/components/schemas/SessionStatus' }
        intent: { $ref: '#/components/schemas/Intent' }
        source_type: { $ref: '#/components/schemas/SourceType' }
        preferred_outputs:
          type: array
          items: { $ref: '#/components/schemas/OutputType' }
        current_step: { type: [string, 'null'] }
        next_action: { type: [string, 'null'] }
        teacher_visible_message: { type: string }
        progress_percent: { type: integer, minimum: 0, maximum: 100 }
        context_version: { type: integer, minimum: 1 }
        detected_context:
          $ref: '#/components/schemas/DetectedContext'
        available_outputs:
          type: array
          items: { $ref: '#/components/schemas/OutputType' }
        warnings:
          type: array
          items: { $ref: '#/components/schemas/Issue' }
        recoverable_errors:
          type: array
          items: { $ref: '#/components/schemas/Issue' }
        expires_at: { type: string, format: date-time }
    Issue:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        file_id: { type: [string, 'null'], format: uuid }
        page_index: { type: [integer, 'null'], minimum: 1 }
        task_id: { type: [string, 'null'], format: uuid }
        output_type:
          oneOf:
            - $ref: '#/components/schemas/OutputType'
            - type: 'null'
        retryable: { type: boolean, default: false }
    ConfirmContextRequest:
      type: object
      additionalProperties: false
      required: [expected_context_version, apply_mode, context]
      properties:
